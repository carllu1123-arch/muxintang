<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 背景：黑 -->
  <rect width="512" height="512" fill="#0B0B0B"/>

  <!-- 外圈：金 -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#D4AF37" stroke-width="4" opacity="0.5"/>

  <!-- 内圈：薄金线 -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.3"/>

  <!-- 中心：金色牧字 -->
  <text
    x="256"
    y="256"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Noto Serif SC', 'Songti SC', 'STSong', 'SimSun', serif"
    font-size="240"
    font-weight="500"
    fill="#D4AF37"
  >牧</text>

  <!-- 下方副标：牧心堂 -->
  <text
    x="256"
    y="420"
    text-anchor="middle"
    font-family="'Noto Serif SC', 'Songti SC', 'STSong', 'SimSun', serif"
    font-size="36"
    letter-spacing="12"
    fill="#D4AF37"
    opacity="0.85"
  >牧心堂</text>
</svg>
